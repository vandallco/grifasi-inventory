<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="glow" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#d4a853" stop-opacity="0.28"/>
      <stop offset="50%" stop-color="#d4a853" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#131210" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="barGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f0efe9" stop-opacity="0.55"/>
      <stop offset="50%" stop-color="#f0efe9" stop-opacity="1"/>
      <stop offset="100%" stop-color="#f0efe9" stop-opacity="0.55"/>
    </linearGradient>
    <clipPath id="round">
      <rect width="512" height="512" rx="110" ry="110"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="110" ry="110" fill="#131210"/>

  <!-- Subtle border -->
  <rect width="512" height="512" rx="110" ry="110" fill="none" stroke="#2a2724" stroke-width="2"/>

  <!-- Glow layer -->
  <rect width="512" height="512" rx="110" ry="110" fill="url(#glow)" clip-path="url(#round)"/>

  <!-- Brand mark: three bars -->
  <g transform="translate(256, 256)">
    <!-- Top bar -->
    <rect x="-110" y="-70" width="220" height="18" rx="9" fill="url(#barGrad)"/>
    <!-- Middle bar -->
    <rect x="-75" y="-9" width="150" height="18" rx="9" fill="url(#barGrad)"/>
    <!-- Bottom bar -->
    <rect x="-110" y="52" width="220" height="18" rx="9" fill="url(#barGrad)"/>
  </g>

  <!-- Dot accent on lower right -->
  <circle cx="370" cy="380" r="6" fill="#d4a853" opacity="0.6"/>
</svg>
